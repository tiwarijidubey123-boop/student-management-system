<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduManage - Glassmorphism Login</title>
    <style>
        /* बेसिक रीसेट */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* शानदार ग्रेडिएंट बैकग्राउंड */
        body {
            background: linear-gradient(135deg, #8e2de2, #4a00e0);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* बैकग्राउंड में तैरते हुए शेप्स (ताकि कांच का इफ़ेक्ट दिखे) */
        .shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(2px);
        }

        .shape1 {
            width: 200px;
            height: 200px;
            background: linear-gradient(to right, #ff512f, #dd2476);
            top: 15%;
            left: 25%;
            animation: float 6s ease-in-out infinite;
        }

        .shape2 {
            width: 250px;
            height: 250px;
            background: linear-gradient(to right, #00c9ff, #92fe9d);
            bottom: 10%;
            right: 25%;
            animation: float 8s ease-in-out infinite reverse;
        }

        /* एनिमेशन */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }

        /* 🌟 मेन ग्लासमॉर्फिज़्म बॉक्स 🌟 */
        .glass-box {
            width: 400px;
            background: rgba(255, 255, 255, 0.1); /* हल्का सफेद रंग */
            backdrop-filter: blur(15px); /* कांच वाला ब्लर इफ़ेक्ट */
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3); /* चमकदार किनारा */
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            position: relative;
            z-index: 10;
            text-align: center;
            color: white;
        }

        .glass-box h2 {
            font-size: 28px;
            margin-bottom: 20px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        /* इनपुट फील्ड्स */
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
        }

        .input-group input, .input-group select {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.15); /* इनपुट भी कांच जैसा */
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            outline: none;
            color: white;
            font-size: 15px;
            transition: 0.3s;
        }

        /* प्लेसहोल्डर का रंग */
        .input-group input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        /* क्लिक करने पर इनपुट का बॉर्डर चमकेगा */
        .input-group input:focus, .input-group select:focus {
            background: rgba(255, 255, 255, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        .input-group select option {
            color: black; /* ड्रॉपडाउन के अंदर का टेक्स्ट काला रखा है ताकि साफ दिखे */
        }

        /* सबमिट बटन */
        .login-btn {
            width: 100%;
            padding: 12px;
            background: white;
            color: #4a00e0;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .login-btn:hover {
            background: rgba(255, 255, 255, 0.8);
            transform: translateY(-2px);
        }

        /* नीचे का छोटा टेक्स्ट */
        .links {
            margin-top: 20px;
            font-size: 13px;
        }

        .links a {
            color: white;
            text-decoration: none;
            font-weight: 500;
        }

        .links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <!-- बैकग्राउंड के डिज़ाइन (Circles) -->
    <div class="shape shape1"></div>
    <div class="shape shape2"></div>

    <!-- ग्लासमॉर्फिज़्म लॉगिन फॉर्म -->
    <div class="glass-box">
        <h2>🎓 EduManage</h2>
        <p style="margin-bottom: 25px; font-size: 14px; opacity: 0.8;">Welcome back! Please login to your account.</p>

        <form>
            <div class="input-group">
                <label for="role">Login As</label>
                <select id="role">
                    <option value="student">Student</option>
                    <option value="teacher">Teacher / Faculty</option>
                    <option value="admin">Admin</option>
                </select>
            </div>

            <div class="input-group">
                <label for="email">Email / ID</label>
                <input type="text" id="email" placeholder="Enter your ID or Email" required>
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter your password" required>
            </div>

            <button type="submit" class="login-btn">Secure Login</button>
        </form>

        <div class="links">
            <a href="#">Forgot Password?</a> | <a href="#">Help & Support</a>
        </div>
    </div>

</body>
